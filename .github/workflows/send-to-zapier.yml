name: Send pending post to Zapier

on:
  push:
    branches:
      - main
    paths:
      - 'pending-post.json'

permissions:
  contents: write

jobs:
  send-to-zapier:
    runs-on: ubuntu-latest
    if: github.event.head_commit.message != 'Scheduler: sent pending post to Zapier'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check pending-post.json exists and was added not deleted
        id: check
        run: |
          if [ ! -f pending-post.json ]; then
            echo "pending-post.json not found, skipping"
            echo "should_post=false" >> $GITHUB_OUTPUT
          else
            echo "should_post=true" >> $GITHUB_OUTPUT
          fi

      - name: Send payload to Zapier
        if: steps.check.outputs.should_post == 'true'
        id: zapier
        run: |
          PAYLOAD=$(cat pending-post.json)
          RESPONSE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -X POST "${{ secrets.ZAPIER_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "Response body: $(cat /tmp/response.txt)"
          if [ "$RESPONSE" -lt 200 ] || [ "$RESPONSE" -gt 299 ]; then
            echo "Zapier webhook failed with status $RESPONSE"
            exit 1
          fi

      - name: Delete pending-post.json
        if: steps.check.outputs.should_post == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm pending-post.json
          git commit -m "Scheduler: sent pending post to Zapier"
          git push
